# Render Blueprint — deploys the Population Modeler as a static site.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: population-modeler
    runtime: static
    staticPublishPath: ./public
    buildCommand: ""
    autoDeploy: true
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      # Short-lived cache: keep deployments cheap to iterate on. Bump
      # DATA_VERSION in app.js when bundled JSON changes to force re-fetch.
      - path: /data/*
        name: Cache-Control
        value: public, max-age=300, must-revalidate
      - path: /*.js
        name: Cache-Control
        value: public, max-age=300, must-revalidate
      - path: /*.css
        name: Cache-Control
        value: public, max-age=300, must-revalidate
